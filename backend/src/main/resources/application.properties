# Server Configuration
server.port=8080
server.servlet.context-path=/api
spring.application.name=digital-agency-dashboard

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/digital_agency_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Flyway Configuration
spring.flyway.baselineOnMigrate=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration
jwt.secret=your_super_secret_key_that_must_be_at_least_32_characters_long_for_HS256
jwt.expiration=900000
jwt.refreshExpiration=604800000

# CORS Configuration
cors.allowedOrigins=http://localhost:5173,http://localhost:3000
cors.allowedMethods=GET,POST,PUT,DELETE,OPTIONS
cors.allowedHeaders=*
cors.maxAge=3600

# Logging
logging.level.root=INFO
logging.level.com.agency=DEBUG
logging.level.org.springframework.security=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
